name: Refresh data

on:
  schedule:
    - cron: "0 6 * * 0"    # Sundays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Ingest raw data
        run: python scripts/ingest.py
      - name: Run QA
        run: python scripts/qa.py
      - name: Export Parquet + GeoJSON
        run: python scripts/export_parquet.py
      - name: Open refresh PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: data-refresh/${{ github.run_id }}
          title: "chore(data): weekly refresh"
          commit-message: "chore(data): weekly refresh"
          body: |
            Automated weekly data refresh produced by `scripts/ingest.py`.
            Review Parquet and GeoJSON diffs before merging.
          add-paths: |
            db/parquet/*.parquet
            public/parquet/*.parquet
            public/facilities.geojson
          labels: data-refresh
